name: Proof Verification

on:
  push:
    branches: [main, 'step/**']
    tags: ['proof-*']
  pull_request:
  workflow_dispatch:

jobs:
  proof:
    name: Proof Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
